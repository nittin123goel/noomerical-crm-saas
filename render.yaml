services:
  # ── Backend API ─────────────────────────────────────────────
  - type: web
    name: noomerical-crm-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Set these in Render dashboard → Environment:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: SUPERADMIN_SECRET
        sync: false

  # ── Frontend (Static Site) ───────────────────────────────────
  - type: web
    name: noomerical-crm-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
